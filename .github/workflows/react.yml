name: React CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Build Docker Image
        run: docker build -t weather-app .

      - name: Stop Old Container
        run: docker stop weather-container || true

      - name: Remove Old Container
        run: docker rm weather-container || true

      - name: Run New Container
        run: docker run -d -p 8080:80 --name weather-container weather-app